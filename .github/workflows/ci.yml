name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx
        
    - name: Run tests
      env:
        DATABASE_URL: "postgresql+psycopg://user:password@localhost:5432/test_db"
        REDIS_URL: "redis://localhost:6379/0"
        JWT_SECRET: "test_secret"
        GEMINI_API_KEY: "test_key"
      run: |
        cd backend && PYTHONPATH=.. pytest tests/
        
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Build Next.js
      run: |
        cd frontend
        npm run build

  docker-verify:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Docker Image
      run: docker build -t athenis-backend:latest -f ./backend/Dockerfile .
      
    - name: Build Frontend Docker Image
      run: docker build -t athenis-frontend:latest ./frontend
