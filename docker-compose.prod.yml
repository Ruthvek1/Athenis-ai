version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: athenis-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-athenis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - athenis_network

  redis:
    image: redis:alpine
    container_name: athenis-redis-prod
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - athenis_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: athenis-backend
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-athenis}
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super_secret_production_key}
    volumes:
      - uploads_data:/app/backend/uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - athenis_network

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: athenis-celery
    command: ["celery", "-A", "backend.core.celery_app", "worker", "--loglevel=info"]
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-athenis}
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super_secret_production_key}
    volumes:
      - uploads_data:/app/backend/uploads
    depends_on:
      - postgres
      - redis
      - backend
    restart: unless-stopped
    networks:
      - athenis_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: athenis-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - athenis_network

volumes:
  postgres_data:
  uploads_data:

networks:
  athenis_network:
    external: true
