groups:
- name: AthenisAlerts
  rules:
  - alert: HighAPIErrorRate
    expr: rate(fastapi_requests_total{status=~"5.."}[5m]) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: High API Error Rate
      description: "More than 5% of API requests are failing with 5xx status codes."

  - alert: HighRetrievalLatency
    expr: histogram_quantile(0.95, rate(rag_retrieval_latency_seconds_bucket[5m])) > 1.0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Slow Vector Retrieval
      description: "95th percentile of RAG vector retrieval latency is over 1 second."

  - alert: HighLLMLatency
    expr: histogram_quantile(0.95, rate(llm_generation_latency_seconds_bucket[5m])) > 10.0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Slow LLM Generations
      description: "95th percentile of LLM generation latency is over 10 seconds."

  - alert: CeleryTasksPilingUp
    expr: rate(celery_task_latency_seconds_count[5m]) == 0
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: No Celery Tasks Processing
      description: "No background tasks have been processed in the last 10 minutes."
